name: Publish Exile Hub

# Republish the landing page (Exile Hub) whenever it changes on master.
# The Exile Hub is a Claude Design .dc component: web/support.js (the dc-runtime)
# auto-boots it and pulls React/Babel from a CDN, so it renders standalone with no build.
# It is deployed to the `feed` branch's docs/ (index.html + support.js) that GitHub Pages serves.
on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - ".github/workflows/publish-hub.yml"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

# Share the feed-branch write lock with build-feed.yml so the two never race on a push.
concurrency:
  group: trending-feed
  cancel-in-progress: false

env:
  DATA_BRANCH: feed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Data branch — carries the published docs/. Checked out into ./published,
      # created as an orphan on the very first run (matches build-feed.yml).
      - name: Check out (or create) the data branch
        env:
          REPO_URL: "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        run: |
          if git ls-remote --exit-code --heads "$REPO_URL" "$DATA_BRANCH" >/dev/null 2>&1; then
            echo "Data branch '$DATA_BRANCH' exists — cloning it."
            git clone --branch "$DATA_BRANCH" --single-branch --depth 1 "$REPO_URL" published
          else
            echo "Data branch '$DATA_BRANCH' not found — creating it as an orphan."
            git clone --depth 1 "$REPO_URL" published
            git -C published checkout --orphan "$DATA_BRANCH"
            git -C published rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Publish Exile Hub landing page
        run: |
          mkdir -p published/docs/vendor
          cp web/exile-hub.dc.html published/docs/index.html
          cp web/support.js        published/docs/support.js
          cp web/vendor/react.production.min.js web/vendor/react-dom.production.min.js published/docs/vendor/
          cp web/favicon.svg web/favicon.ico web/favicon-32.png web/apple-touch-icon.png published/docs/
          cp web/pip-player.html published/docs/
          # Self-host React so the page never depends on unpkg: support.js skips its own CDN
          # fetch when window.React/ReactDOM already exist. Also link the favicon. All injected
          # ONLY in the deployed copy — the canonical .dc stays clean so Claude Design (which
          # provides React itself) keeps working + round-trips.
          INJECT='<link rel="icon" href="./favicon.ico" sizes="any"><link rel="icon" type="image/svg+xml" href="./favicon.svg"><link rel="apple-touch-icon" href="./apple-touch-icon.png"><script src="./vendor/react.production.min.js"></script><script src="./vendor/react-dom.production.min.js"></script>'
          sed -i "s#<script src=\"./support.js\"></script>#${INJECT}<script src=\"./support.js\"></script>#" published/docs/index.html
          grep -q 'vendor/react.production.min.js' published/docs/index.html && echo "Self-hosted React injected." || { echo "injection FAILED"; exit 1; }
          echo "Published Exile Hub (.dc + support.js + vendored React)."

      - name: Commit landing page to the data branch
        working-directory: published
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/index.html docs/support.js docs/vendor docs/pip-player.html \
            docs/favicon.svg docs/favicon.ico docs/favicon-32.png docs/apple-touch-icon.png
          if git diff --cached --quiet; then
            echo "Landing page unchanged this run."
          else
            git commit -m "Publish Exile Hub landing page ($(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push origin "HEAD:$DATA_BRANCH"
          fi
