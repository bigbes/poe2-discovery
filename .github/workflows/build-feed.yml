name: Build trending feed and table

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC) -- change to taste
  workflow_dispatch: {}      # adds a manual "Run workflow" button

# Needed so the job can commit the updated state file + outputs back to the repo.
permissions:
  contents: write

# Don't let two scheduled runs race on the same commit.
concurrency:
  group: trending-feed
  cancel-in-progress: false

env:
  # Generated state + outputs live on THIS branch, never on the code branch.
  # 'master' stays code-only; point GitHub Pages at this branch's /docs folder.
  DATA_BRANCH: feed
  # Shared tuning applied to every feed below (per-feed steps override query/paths).
  LOOKBACK_DAYS: "4"
  TREND_TOP_N: "20"
  MIN_TREND_VELOCITY: "0"
  FEED_MAX: "50"
  EXCLUDE_SHORTS: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Code branch (master) — just the script.
      - name: Check out code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Data branch — carries data/*.json across runs plus the published docs/.
      # Checked out into ./published so it stays separate from the code checkout.
      # Created as an orphan branch on the very first run.
      - name: Check out (or create) the data branch
        env:
          REPO_URL: "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
        run: |
          if git ls-remote --exit-code --heads "$REPO_URL" "$DATA_BRANCH" >/dev/null 2>&1; then
            echo "Data branch '$DATA_BRANCH' exists — cloning it."
            git clone --branch "$DATA_BRANCH" --single-branch --depth 1 "$REPO_URL" published
          else
            echo "Data branch '$DATA_BRANCH' not found — creating it as an orphan."
            git clone --depth 1 "$REPO_URL" published
            git -C published checkout --orphan "$DATA_BRANCH"
            git -C published rm -rf . >/dev/null 2>&1 || true
          fi

      # --- Feed 1: Path of Exile 2 -> /poe2/ ---
      - name: Generate feed — Path of Exile 2
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SEARCH_QUERY: "Path of Exile 2"
          STATE_PATH: "published/data/poe2.json"
          OUTPUT_DIR: "published/docs/poe2"
        run: python poe2_trending.py

      # --- Feed 2: Path of Exile 1 -> /poe1/ ---
      - name: Generate feed — Path of Exile 1
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SEARCH_QUERY: "Path of Exile 1"
          STATE_PATH: "published/data/poe1.json"
          OUTPUT_DIR: "published/docs/poe1"
        run: python poe2_trending.py

      # Small landing page at the site root linking to both feeds.
      - name: Write landing page
        run: |
          cat > published/docs/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Path of Exile — Trending on YouTube</title>
          <style>
            :root { color-scheme: dark; }
            body { margin: 0; min-height: 100vh; display: grid; place-items: center;
                   background: #0f1115; color: #e6e8ee;
                   font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
            main { padding: 2rem; max-width: 640px; }
            h1 { font-size: 1.4rem; margin: 0 0 .25rem; }
            p.sub { color: #9aa3b2; margin: 0 0 1.5rem; }
            .cards { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
            @media (max-width: 520px) { .cards { grid-template-columns: 1fr; } }
            a.card { display: block; padding: 1.1rem 1.25rem; text-decoration: none;
                     color: #e6e8ee; background: #161a22; border: 1px solid #232733;
                     border-radius: 12px; transition: border-color .15s, background .15s; }
            a.card:hover { border-color: #3a4152; background: #1a1f29; }
            a.card b { font-size: 1.1rem; }
            a.card span { display: block; color: #9aa3b2; font-size: .85rem; margin-top: .3rem; }
            .links { margin-top: .6rem; font-size: .8rem; }
            .links a { color: #8ab4f8; text-decoration: none; }
            .links a:hover { text-decoration: underline; }
          </style>
          </head>
          <body>
          <main>
            <h1>Path of Exile — Trending on YouTube</h1>
            <p class="sub">Videos logged once each, when they first start gaining views fast.</p>
            <div class="cards">
              <a class="card" href="poe2/">
                <b>Path of Exile 2</b>
                <span>Trending log &amp; table</span>
                <div class="links"><a href="poe2/feed.xml">RSS</a> &middot; <a href="poe2/trending.csv">CSV</a></div>
              </a>
              <a class="card" href="poe1/">
                <b>Path of Exile 1</b>
                <span>Trending log &amp; table</span>
                <div class="links"><a href="poe1/feed.xml">RSS</a> &middot; <a href="poe1/trending.csv">CSV</a></div>
              </a>
            </div>
          </main>
          </body>
          </html>
          HTML
          echo "Wrote landing page."

      - name: Commit state + outputs to the data branch
        working-directory: published
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data docs
          if git diff --cached --quiet; then
            echo "Nothing changed this run."
          else
            git commit -m "Update trending feeds ($(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push origin "HEAD:$DATA_BRANCH"
          fi
